server:
  port: 8070

  datasource:
    url: ${H2_URL:jdbc:h2:file:./data/customerdb}
    driver-class-name: org.h2.Driver
    username:  ${H2_USER_NAME:sa}
    password: ${H2_PASSWORD:}

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true