
server:
  port: 8080


spring:
  application:
    name: gateway-service



  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: customer-service
              uri: lb://customer-service
              predicates:
                - Path=/api/customers/**
            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/api/orders/**
            - id: product-service
              uri: lb://product-service
              predicates:
                - Path=/api/products/**
            - id: eureka-server
              uri: http://localhost:8761
              predicates:
                - Path=/eureka/web
              filters:
                - SetPath=/

            - id: eureka-server-static
              uri: http://localhost:8761
              predicates:
                - Path=/eureka/**






