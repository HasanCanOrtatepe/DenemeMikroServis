# Proje adi acikca verilmeli: varsayilan olarak klasor adi ("infra") kullanilir
# ve bu makinedeki diger "infra" yigininin volume'leriyle cakisir.
name: denememikro

services:
  postgres:
    image: docker.io/library/postgres:17-alpine
    container_name: deneme-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-deneme}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-deneme123}
      # init script bu veritabanini olusturur, digerleri init/01-init-databases.sh icinde
      POSTGRES_DB: postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # init klasoru sadece ILK ayaga kalkista (volume bosken) calisir
      - ./init:/docker-entrypoint-initdb.d:z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-deneme} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: docker.io/dpage/pgadmin4:latest
    container_name: deneme-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@deneme.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      - postgres

volumes:
  postgres-data:
  pgadmin-data:
